<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact Sorted JA to get started with premium document and administrative support." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Contact | Sorted JA</title>
  </head>
  <body data-page="contact">
    <div data-component="site-header"></div>

    <main>
      <section class="page-hero">
        <div class="container-shell reveal">
          <h1 class="text-4xl font-bold md:text-5xl">Contact Sorted JA</h1>
          <p class="mt-5 max-w-3xl text-lg text-slate-300">Tell us what you need. We will recommend the fastest and most practical path.</p>
        </div>
      </section>

      <section class="py-20">
        <div class="container-shell grid gap-8 lg:grid-cols-[1.2fr_1fr]">
          <form class="glass reveal grid gap-4 p-6 md:p-8">
            <input class="rounded-xl border border-white/15 bg-slate-950 px-4 py-3 text-sm text-white outline-none focus:border-brand-400" type="text" placeholder="Full Name" required />
            <input class="rounded-xl border border-white/15 bg-slate-950 px-4 py-3 text-sm text-white outline-none focus:border-brand-400" type="email" placeholder="Email Address" required />
            <input class="rounded-xl border border-white/15 bg-slate-950 px-4 py-3 text-sm text-white outline-none focus:border-brand-400" type="tel" placeholder="Phone Number" />
            <select class="rounded-xl border border-white/15 bg-slate-950 px-4 py-3 text-sm text-white outline-none focus:border-brand-400" required>
              <option value="">Service Needed</option>
              <option>Travel & Immigration</option>
              <option>Motor Vehicle Services</option>
              <option>Personal Documents</option>
              <option>Diaspora Services</option>
            </select>
            <textarea class="min-h-32 rounded-xl border border-white/15 bg-slate-950 px-4 py-3 text-sm text-white outline-none focus:border-brand-400" placeholder="How can we help?"></textarea>
            <button type="submit" class="btn-primary">Send Request</button>
          </form>

          <aside class="space-y-4 reveal">
            <div class="feature-card">
              <h2 class="text-2xl font-semibold">Office</h2>
              <p class="mt-3 text-sm text-slate-300">Kingston, Jamaica</p>
            </div>
            <div class="feature-card">
              <h2 class="text-2xl font-semibold">Email</h2>
              <p class="mt-3 text-sm text-slate-300">hello@sortedja.com</p>
            </div>
            <div class="feature-card">
              <h2 class="text-2xl font-semibold">Phone</h2>
              <p class="mt-3 text-sm text-slate-300">+1 (876) 555-0199</p>
            </div>
            <div class="feature-card">
              <h2 class="text-2xl font-semibold">Hours</h2>
              <p class="mt-3 text-sm text-slate-300">Mon-Fri: 9:00 AM - 5:30 PM</p>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <div data-component="site-footer"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
